<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Maze Game - Login</title>
    <link rel="stylesheet" href="../CSS/login.css">
</head>
<body>

<div class="container">

    <!-- LOGIN CARD -->
    <div class="card" id="loginCard">
        <div class="header">
            <div class="logo-container">
                <img src="../../images/logo.jpeg" class="logo" alt="AI Maze Game Logo">
            </div>
            <h1>AI MAZE <span>GAME</span></h1>
            <p>Initialize your agent credentials</p>
        </div>
        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" placeholder="Enter Email" required>
                <span class="field-error" id="loginEmailErr"></span>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="text" id="loginPassword" placeholder="Enter Password" required>
                <span class="field-error" id="loginPasswordErr"></span>
            </div>
            <p class="form-msg" id="loginMsg"></p>
            <button class="btn" type="submit">LOGIN</button>
        </form>
        <div class="switch-form">
            New User? <a href="#" id="showRegister">Register</a>
        </div>
    </div>

    <!-- REGISTER CARD -->
    <div class="card hidden" id="registerCard">
        <div class="header">
            <div class="logo-container">
                <img src="../../images/logo.jpeg" class="logo" alt="AI Maze Game Logo">
            </div>
            <h1>AI MAZE <span>GAME</span></h1>
            <p>Create your account</p>
        </div>
        <form id="registerForm" novalidate>
            <div class="form-group">
                <label for="regUsername">Username</label>
                <input type="text" id="regUsername" placeholder="Username" required>
                <span class="field-error" id="regUsernameErr"></span>
            </div>
            <div class="form-group">
                <label for="regEmail">Email</label>
                <input type="email" id="regEmail" placeholder="Email" required>
                <span class="field-error" id="regEmailErr"></span>
            </div>
            <div class="form-group">
                <label for="registerPassword">Password</label>
                <input type="text" id="registerPassword" placeholder="Min 6 characters" required>
                <span class="field-error" id="regPasswordErr"></span>
            </div>
            <p class="form-msg" id="registerMsg"></p>
            <button class="btn" type="submit">REGISTER</button>
        </form>
        <div class="switch-form">
            Already have an account? <a href="#" id="showLogin">Login</a>
        </div>
    </div>

</div>

<script src="../JS/login.js"></script>
</body>
</html>
