<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Maze Game - Play</title>
    <link rel="stylesheet" href="../CSS/maze.css">
</head>
<body>

<div class="maze-page">

    <!-- Top Bar -->
    <div class="topbar">
        <img src="../../images/logo.jpeg" class="logo" alt="logo">
        <div class="info">
            <span id="difficultyBadge" class="badge">--</span>
            <span id="algoLabel" class="algo-label">Algorithm: --</span>
        </div>
        <div class="stats">
            <div class="stat"><span class="stat-label">MOVES</span><span id="moveCount">0</span></div>
            <div class="stat"><span class="stat-label">TIME</span><span id="timer">00:00</span></div>
        </div>
        <button class="btn-solve" id="solveBtn">🤖 AI SOLVE</button>
        <button class="btn-hint"  id="hintBtn">💡 HINT <span id="hintCount">(3)</span></button>
        <button class="btn-new"   id="newBtn">🔄 NEW MAZE</button>
    </div>

    <!-- Maze Canvas -->
    <div class="canvas-wrap">
        <div id="loadingMsg" class="loading">Generating maze...</div>
        <canvas id="mazeCanvas"></canvas>
    </div>

    <!-- Controls hint -->
    <div class="controls-hint">
        Use <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> arrow keys to move
    </div>

    <!-- Win Modal -->
    <div id="winModal" class="modal hidden">
        <div class="modal-box">
            <h2 id="winTitle">🎉 You Solved It!</h2>

            <div class="score-board">
                <div class="score-row">
                    <span class="score-label">Your Moves</span>
                    <span class="score-val" id="wYourMoves">--</span>
                </div>
                <div class="score-row">
                    <span class="score-label">Shortest Path <span class="algo-tag" id="wAlgo"></span></span>
                    <span class="score-val optimal" id="wOptimal">--</span>
                </div>
                <div class="score-row">
                    <span class="score-label">Efficiency</span>
                    <span class="score-val" id="wEfficiency">--%</span>
                </div>
                <div class="score-row">
                    <span class="score-label">Time</span>
                    <span class="score-val" id="wTime">--</span>
                </div>
                <div class="score-divider"></div>
                <div class="score-row final">
                    <span class="score-label">⭐ Final Score</span>
                    <span class="score-val score-final" id="wScore">--</span>
                </div>
            </div>

            <div class="modal-btns">
                <button id="playAgainBtn">PLAY AGAIN</button>
                <button id="changeLevelBtn">CHANGE LEVEL</button>
            </div>
        </div>
    </div>

</div>

<script src="../JS/maze.js"></script>
</body>
</html>
